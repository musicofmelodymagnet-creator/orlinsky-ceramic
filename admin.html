<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORLINSKY · Админ-панель</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0F0E0C;
  --surface: #1A1815;
  --surface2: #222018;
  --border: rgba(184,146,74,0.18);
  --bronze: #B8924A;
  --bronze-light: #D4AA6A;
  --ivory: #F5F0E8;
  --text: #B8B0A0;
  --text-dim: #5A5248;
  --danger: #B85050;
  --success: #6A9E70;
  --sidebar-w: 240px;
}
html, body { height: 100%; background: var(--bg); color: var(--ivory); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }

/* LOGIN */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, rgba(184,146,74,0.06) 0%, transparent 70%);
}
.login-box {
  width: 360px;
  padding: 52px 48px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.login-logo {
  font-size: 0.75rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--bronze);
  margin-bottom: 8px;
  text-align: center;
}
.login-sub {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 40px;
}
.login-box input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ivory);
  padding: 12px 16px;
  font-size: 14px;
  outline: none;
  margin-bottom: 12px;
  transition: border-color 0.3s;
}
.login-box input:focus { border-color: var(--bronze); }
.login-box button {
  width: 100%;
  background: var(--bronze);
  color: var(--bg);
  border: none;
  padding: 12px;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.3s;
  margin-top: 4px;
}
.login-box button:hover { background: var(--bronze-light); }
.login-error { color: var(--danger); font-size: 0.75rem; margin-top: 10px; text-align: center; min-height: 18px; }

/* APP */
#app { display: none; height: 100vh; flex-direction: column; }
.admin-header {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-logo { font-size: 0.7rem; letter-spacing: 0.3em; color: var(--bronze); text-transform: uppercase; }
.btn-logout {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 14px;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.3s, border-color 0.3s;
}
.btn-logout:hover { color: var(--ivory); border-color: var(--ivory); }

.admin-layout { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.admin-sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px 0;
}
.sidebar-group { margin-bottom: 4px; }
.sidebar-group-label {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 12px 20px 6px;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  color: var(--text);
  font-size: 0.82rem;
  transition: background 0.2s, color 0.2s;
  border-left: 2px solid transparent;
}
.sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--ivory); }
.sidebar-item.active { color: var(--bronze); border-left-color: var(--bronze); background: rgba(184,146,74,0.06); }
.sidebar-icon { opacity: 0.5; font-style: normal; width: 16px; text-align: center; }
.sidebar-item.active .sidebar-icon { opacity: 1; }

/* MAIN */
.admin-main { flex: 1; overflow-y: auto; padding: 32px 40px; }
.panel { display: none; }
.panel.active { display: block; }
.panel-title {
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--ivory);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}
.panel-desc { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 28px; }

/* LANG TABS */
.lang-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
.lang-tab {
  padding: 8px 20px;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.2s, border-color 0.2s;
}
.lang-tab:hover { color: var(--ivory); }
.lang-tab.active { color: var(--bronze); border-bottom-color: var(--bronze); }

/* FIELDS */
.field-group { margin-bottom: 20px; }
.field-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 7px; }
.field-hint { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 7px; opacity: 0.7; }
.admin-input, .admin-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--ivory);
  padding: 10px 14px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
  resize: vertical;
}
.admin-input:focus, .admin-textarea:focus { border-color: var(--bronze); }
.admin-textarea { min-height: 80px; }
.field-section-title {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--bronze);
  margin: 28px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.save-bar {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}
.btn-save {
  background: var(--bronze);
  color: var(--bg);
  border: none;
  padding: 10px 28px;
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.3s;
}
.btn-save:hover { background: var(--bronze-light); }
.btn-reset {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 10px 20px;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.3s, border-color 0.3s;
}
.btn-reset:hover { color: var(--danger); border-color: var(--danger); }
.save-status { font-size: 0.72rem; color: var(--success); opacity: 0; transition: opacity 0.3s; }

/* REVIEWS */
.reviews-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
.review-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 18px 20px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
}
.review-item-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  flex-shrink: 0;
  border: 1px solid rgba(184,146,74,0.3);
}
.av1 { background: linear-gradient(135deg, #6B5040, #4A3828); }
.av2 { background: linear-gradient(135deg, #3D4A3A, #2A3527); }
.av3 { background: linear-gradient(135deg, #4A4035, #2C2820); }
.review-item-body { flex: 1; min-width: 0; }
.review-item-name { font-size: 0.8rem; color: var(--ivory); margin-bottom: 4px; }
.review-item-text { font-size: 0.75rem; color: var(--text); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.review-item-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn-sm {
  padding: 5px 12px;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-dim);
  transition: color 0.2s, border-color 0.2s;
}
.btn-sm:hover { color: var(--ivory); border-color: rgba(255,255,255,0.3); }
.btn-sm.danger:hover { color: var(--danger); border-color: var(--danger); }
.btn-add {
  background: none;
  border: 1px dashed var(--border);
  color: var(--text-dim);
  padding: 12px;
  width: 100%;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.btn-add:hover { color: var(--bronze); border-color: var(--bronze); }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,9,8,0.85);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  width: 100%;
  max-width: 640px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 36px 40px;
}
.modal-title { font-size: 0.9rem; color: var(--ivory); margin-bottom: 24px; letter-spacing: 0.05em; }
.modal-actions { display: flex; gap: 12px; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
.color-options { display: flex; gap: 10px; margin-bottom: 6px; }
.color-opt {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.color-opt.selected { border-color: var(--bronze); }

/* MEDIA */
.media-slots { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
.media-slot {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.media-slot-preview {
  width: 72px;
  height: 48px;
  object-fit: cover;
  background: var(--bg);
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.media-slot-preview.video-preview {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 1.2rem;
}
.media-slot-info { flex: 1; min-width: 0; }
.media-slot-label { font-size: 0.75rem; color: var(--ivory); margin-bottom: 4px; }
.media-slot-path { font-size: 0.65rem; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.media-slot-actions { display: flex; gap: 8px; flex-shrink: 0; }
.media-upload-area {
  border: 1px dashed var(--border);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.3s;
}
.media-upload-area:hover { border-color: var(--bronze); }
.media-upload-area p { font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; }
.media-library { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 24px; }
.media-lib-item { background: var(--surface2); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: border-color 0.3s; }
.media-lib-item:hover { border-color: var(--bronze); }
.media-lib-thumb { width: 100%; height: 90px; object-fit: cover; display: block; }
.media-lib-name { font-size: 0.6rem; color: var(--text-dim); padding: 6px 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 14px 20px;
  font-size: 0.78rem;
  color: var(--ivory);
  z-index: 9999;
  transform: translateY(20px);
  opacity: 0;
  transition: transform 0.3s, opacity 0.3s;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }

/* PREVIEW PANE */
.preview-pane {
  width: 0;
  overflow: hidden;
  transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
  border-left: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.preview-pane.open { width: 400px; }
.preview-pane-header {
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  border-bottom: 1px solid var(--border);
  gap: 6px;
  flex-shrink: 0;
}
.preview-pane-title {
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  flex: 1;
}
.btn-icon {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 5px 8px;
  font-size: 1rem;
  line-height: 1;
  transition: color 0.2s;
}
.btn-icon:hover { color: var(--ivory); }
.preview-wrapper {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: #0a0908;
  display: flex;
  justify-content: center;
  padding: 16px 0;
}
.preview-iframe {
  border: none;
  width: 375px;
  height: 2800px;
  flex-shrink: 0;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
}
.btn-preview {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 14px;
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.btn-preview:hover { color: var(--bronze); border-color: var(--bronze); }
.btn-preview.active { color: var(--bronze); border-color: var(--bronze); background: rgba(184,146,74,0.06); }
.btn-open-site {
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 5px 10px;
  font-size: 0.72rem;
  cursor: pointer;
  transition: color 0.2s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}
.btn-open-site:hover { color: var(--ivory); }

/* MEDIA GRID CARDS */
.media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}
.media-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: border-color 0.25s;
}
.media-card:hover { border-color: rgba(184,146,74,0.45); }
.media-card-img-wrap {
  position: relative;
  height: 125px;
  overflow: hidden;
  background: var(--bg);
  cursor: pointer;
}
.media-card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.35s;
}
.media-card:hover .media-card-img-wrap img { transform: scale(1.06); }
.media-card-video-icon {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  color: var(--text-dim);
}
.media-card-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.58);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.media-card:hover .media-card-overlay { opacity: 1; }
.media-card-replace-btn {
  background: var(--bronze);
  color: var(--bg);
  border: none;
  padding: 8px 18px;
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
}
.media-card-replace-btn:hover { background: var(--bronze-light); }
.media-card-footer {
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.media-card-label {
  font-size: 0.68rem;
  color: var(--ivory);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

/* INLINE MEDIA (inside text panels) */
.inline-media-section {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 0;
  padding: 18px 20px 16px;
  margin-bottom: 28px;
}
.inline-media-section-title {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
}
.inline-media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}
.inline-media-card {
  background: var(--bg);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: border-color 0.2s;
}
.inline-media-card:hover { border-color: rgba(184,146,74,0.5); }
.inline-media-img-wrap {
  position: relative;
  height: 100px;
  overflow: hidden;
  background: var(--surface);
  cursor: pointer;
}
.inline-media-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}
.inline-media-card:hover .inline-media-img-wrap img { transform: scale(1.06); }
.inline-media-video-icon {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  color: var(--text-dim);
}
.inline-media-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.inline-media-card:hover .inline-media-overlay { opacity: 1; }
.inline-media-replace-btn {
  background: var(--bronze);
  color: var(--bg);
  border: none;
  padding: 6px 14px;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
}
.inline-media-name {
  padding: 6px 8px;
  font-size: 0.6rem;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">ORLINSKY</div>
    <div class="login-sub">Панель управления</div>
    <input type="password" id="loginPass" placeholder="Введите пароль" autocomplete="current-password">
    <button onclick="doLogin()">Войти</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="admin-header">
    <div class="header-logo">ORLINSKY · Admin</div>
    <div style="display:flex;align-items:center;gap:10px">
      <a href="index.html" target="_blank" class="btn-open-site">↗ Открыть сайт</a>
      <button class="btn-preview" id="previewToggle" onclick="togglePreview()">◫ Предпросмотр</button>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </div>
  <div class="admin-layout">

    <!-- SIDEBAR -->
    <div class="admin-sidebar">
      <div class="sidebar-group">
        <div class="sidebar-group-label">Тексты</div>
        <div class="sidebar-item active" onclick="showPanel('hero')" data-panel="hero"><i class="sidebar-icon">▶</i>Hero</div>
        <div class="sidebar-item" onclick="showPanel('manifesto')" data-panel="manifesto"><i class="sidebar-icon">❝</i>Манифест</div>
        <div class="sidebar-item" onclick="showPanel('collections')" data-panel="collections"><i class="sidebar-icon">⬡</i>Коллекции</div>
        <div class="sidebar-item" onclick="showPanel('featured')" data-panel="featured"><i class="sidebar-icon">◈</i>Флагман</div>
        <div class="sidebar-item" onclick="showPanel('nature')" data-panel="nature"><i class="sidebar-icon">◎</i>Природа</div>
        <div class="sidebar-item" onclick="showPanel('process')" data-panel="process"><i class="sidebar-icon">⬢</i>Процесс</div>
        <div class="sidebar-item" onclick="showPanel('packaging')" data-panel="packaging"><i class="sidebar-icon">▣</i>Упаковка</div>
        <div class="sidebar-item" onclick="showPanel('gallery')" data-panel="gallery"><i class="sidebar-icon">◼</i>Галерея</div>
        <div class="sidebar-item" onclick="showPanel('contact')" data-panel="contact"><i class="sidebar-icon">◻</i>Контакт</div>
        <div class="sidebar-item" onclick="showPanel('footer')" data-panel="footer"><i class="sidebar-icon">▬</i>Футер</div>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-label">Контент</div>
        <div class="sidebar-item" onclick="showPanel('reviews')" data-panel="reviews"><i class="sidebar-icon">★</i>Отзывы</div>
        <div class="sidebar-item" onclick="showPanel('media')" data-panel="media"><i class="sidebar-icon">◫</i>Медиафайлы</div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="admin-main" id="mainArea"></div>

    <!-- PREVIEW PANE -->
    <div class="preview-pane" id="previewPane">

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function init() {
  const r = await fetch('api/auth.php').then(r => r.json());
  if (r.authenticated) {
    await loadContent();
    showApp();
  }
}

async function doLogin() {
  const pass = document.getElementById('loginPass').value;
  const r = await fetch('api/login.php', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ password: pass }) });
  if (r.ok) {
    await loadContent();
    showApp();
  } else {
    document.getElementById('loginError').textContent = 'Неверный пароль';
    document.getElementById('loginPass').value = '';
  }
}

document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogout() {
  await fetch('api/logout.php', { method: 'POST' });
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  showPanel('hero');
}

async function loadContent() {
  content = await fetch('api/content.php').then(r => r.json());
  if (!content.reviews) content.reviews = [];
  if (!content.media) content.media = {};
}

// ─── Panels ───────────────────────────────────────────────────────────────────
function showPanel(id) {
  currentPanel = id;
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.panel === id);
  });
  const main = document.getElementById('mainArea');
  if (id === 'reviews') { renderReviewsPanel(main); return; }
  if (id === 'media')   { renderMediaPanel(main); return; }
  renderTextPanel(id, main);
}

// ─── Inline media helper ──────────────────────────────────────────────────────
function renderInlineMedia(mediaKeys) {
  if (!mediaKeys || !mediaKeys.length) return '';
  const cards = mediaKeys.map(key => {
    const slot = MEDIA_SLOTS.find(s => s.key === key);
    if (!slot) return '';
    const cur = content.media?.[slot.key] || slot.default;
    const isVideo = slot.type === 'video';
    const shortLabel = slot.label.replace(/^[^—]*— ?/, '');
    const inner = isVideo
      ? `<div class="inline-media-video-icon">▶</div>
         <div class="inline-media-overlay">
           <button class="inline-media-replace-btn" onclick="replaceMedia('${slot.key}','${slot.type}');event.stopPropagation()">Заменить</button>
         </div>`
      : `<img src="${cur}?t=${Date.now()}" alt="" onerror="this.style.opacity='0.12'">
         <div class="inline-media-overlay">
           <button class="inline-media-replace-btn" onclick="replaceMedia('${slot.key}','${slot.type}');event.stopPropagation()">Заменить</button>
         </div>`;
    return `<div class="inline-media-card">
      <div class="inline-media-img-wrap">${inner}</div>
      <div class="inline-media-name">${shortLabel}</div>
    </div>`;
  }).join('');
  return `<div class="inline-media-section">
    <div class="inline-media-section-title">Медиафайлы раздела</div>
    <div class="inline-media-grid">${cards}</div>
  </div>`;
}

      ${mediaHtml}
      <div class="lang-tabs">
        <div class="lang-tab ${currentLang==='ru'?'active':''}" onclick="switchLang('ru')">RUS</div>
        <div class="lang-tab ${currentLang==='en'?'active':''}" onclick="switchLang('en')">ENG</div>
        <div class="lang-tab ${currentLang==='uk'?'active':''}" onclick="switchLang('uk')">UKR</div>
      </div>
      <div id="text-fields">${renderTextFields(sec, currentLang)}</div>
      <div class="save-bar">
        <button class="btn-save" onclick="saveContent('${sectionId}')">Сохранить изменения</button>
        <button class="btn-reset" onclick="resetSection('${sectionId}')">Сбросить к исходным</button>
        <span class="save-status" id="saveStatus">Сохранено ✓</span>
      </div>
    </div>`;
}

function renderTextFields(sec, lang) {
  return sec.fields.map(f => {
    if (typeof f === 'string' && f.startsWith('__divider__')) {
      return `<div class="field-section-title">${f.replace('__divider__','')}</div>`;
    }
    const custom = content[lang]?.[f.key] ?? '';
    const def = DEFAULTS[lang]?.[f.key] ?? '';
    const hint = custom ? '' : `<div class="field-hint">Текущий текст: ${esc(def)}</div>`;
    if (f.type === 'textarea') {
      return `<div class="field-group">
        <div class="field-label">${f.label}</div>
        ${hint}
        <textarea class="admin-textarea" data-key="${f.key}" data-lang="${lang}" placeholder="${esc(def)}">${esc(custom)}</textarea>
      </div>`;
    }
    return `<div class="field-group">
      <div class="field-label">${f.label}</div>
      ${hint}
      <input class="admin-input" type="text" data-key="${f.key}" data-lang="${lang}" placeholder="${esc(def)}" value="${esc(custom)}">
    </div>`;
  }).join('');
}

function switchLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  const sec = SECTIONS.find(s => s.id === currentPanel);
  if (sec) document.getElementById('text-fields').innerHTML = renderTextFields(sec, lang);
}

function collectFields() {
  document.querySelectorAll('[data-key][data-lang]').forEach(el => {
    const lang = el.dataset.lang;
    const key = el.dataset.key;
    if (!content[lang]) content[lang] = {};
    content[lang][key] = el.value.trim();
  });
}

async function saveContent(sectionId) {
  collectFields();
  const r = await fetch('api/content.php', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(content) });
  if (r.ok) {
    showToast('Сохранено', 'success');
    if (previewOpen) setTimeout(refreshPreview, 400);
  } else showToast('Ошибка сохранения', 'error');
}

function resetSection(sectionId) {
  if (!confirm('Сбросить все тексты этого раздела к исходным?')) return;
  const sec = SECTIONS.find(s => s.id === sectionId);
  if (!sec) return;
  sec.fields.forEach(f => {
    if (typeof f === 'object') {
      ['ru','en','uk'].forEach(lang => {
        if (content[lang]) delete content[lang][f.key];
      });
    }
  });
  fetch('api/content.php', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(content) });
  renderTextPanel(sectionId, document.getElementById('mainArea'));
  showToast('Сброшено к исходным', 'success');
}

// ─── Reviews ──────────────────────────────────────────────────────────────────
function renderReviewsPanel(container) {
  const items = (content.reviews || []).map((r, i) => `
    <div class="review-item">
      <div class="review-item-avatar ${r.avatarClass || 'av1'}">${r.avatar || '?'}</div>
      <div class="review-item-body">
        <div class="review-item-name">${esc(r.name?.ru || '')} <span style="color:var(--text-dim);font-size:0.7rem">· ${esc(r.city?.ru || '')}</span></div>
        <div class="review-item-text">${esc(r.text?.ru || '')}</div>
      </div>
      <div class="review-item-actions">
        <button class="btn-sm" onclick="editReview(${i})">Изменить</button>
        <button class="btn-sm danger" onclick="deleteReview(${i})">Удалить</button>
      </div>
    </div>`).join('');

  container.innerHTML = `
    <div class="panel active">
      <div class="panel-title">Отзывы клиентов</div>
      <div class="panel-desc">Добавляйте, редактируйте и удаляйте отзывы. Изменения видны на сайте сразу после сохранения.</div>
      <div class="reviews-list">${items || '<p style="color:var(--text-dim);font-size:0.8rem">Отзывов пока нет</p>'}</div>
      <button class="btn-add" onclick="addReview()">+ Добавить отзыв</button>
    </div>`;
}

function addReview() {
  editingReviewIdx = null;
  selectedAvatarColor = 'av1';
  document.getElementById('modalTitle').textContent = 'Добавить отзыв';
  document.getElementById('rv-avatar').value = '';
  document.querySelectorAll('.color-opt').forEach(el => el.classList.toggle('selected', el.dataset.color === 'av1'));
  modalLang = 'ru';
  renderModalLangFields();
  document.querySelectorAll('#reviewModal .lang-tab').forEach(t => t.classList.toggle('active', t.textContent === 'RUS'));
  document.getElementById('reviewModal').classList.add('open');
}

function editReview(idx) {
  editingReviewIdx = idx;
  const r = content.reviews[idx];
  selectedAvatarColor = r.avatarClass || 'av1';
  document.getElementById('modalTitle').textContent = 'Редактировать отзыв';
  document.getElementById('rv-avatar').value = r.avatar || '';
  document.querySelectorAll('.color-opt').forEach(el => el.classList.toggle('selected', el.dataset.color === selectedAvatarColor));
  modalLang = 'ru';
  renderModalLangFields(r);
  document.querySelectorAll('#reviewModal .lang-tab').forEach(t => t.classList.toggle('active', t.textContent === 'RUS'));
  document.getElementById('reviewModal').classList.add('open');
}

function renderModalLangFields(r) {
  const lang = modalLang;
  document.getElementById('modal-lang-fields').innerHTML = `
    <div class="field-group">
      <div class="field-label">Имя</div>
      <input class="admin-input" id="rv-name" value="${esc(r?.name?.[lang] || '')}">
    </div>
    <div class="field-group">
      <div class="field-label">Город</div>
      <input class="admin-input" id="rv-city" value="${esc(r?.city?.[lang] || '')}">
    </div>
    <div class="field-group">
      <div class="field-label">Текст отзыва</div>
      <textarea class="admin-textarea" id="rv-text" style="min-height:100px">${esc(r?.text?.[lang] || '')}</textarea>
    </div>`;
}

function switchModalLang(lang) {
  // Save current fields before switching
  if (editingReviewIdx !== null) {
    const r = content.reviews[editingReviewIdx];
    saveModalFields(r, modalLang);
  }
  modalLang = lang;
  document.querySelectorAll('#reviewModal .lang-tab').forEach(t => {
    const map = { ru:'RUS', en:'ENG', uk:'UKR' };
    t.classList.toggle('active', t.textContent === map[lang]);
  });
  const r = editingReviewIdx !== null ? content.reviews[editingReviewIdx] : null;
  renderModalLangFields(r);
}

function saveModalFields(r, lang) {
  if (!r) return;
  if (!r.name) r.name = {};
  if (!r.text) r.text = {};
  if (!r.city) r.city = {};
  r.name[lang] = document.getElementById('rv-name')?.value || '';
  r.city[lang] = document.getElementById('rv-city')?.value || '';
  r.text[lang] = document.getElementById('rv-text')?.value || '';
}

async function saveReview() {
  const avatar = document.getElementById('rv-avatar').value.trim().substring(0,2);
  const name = document.getElementById('rv-name').value.trim();
  const city = document.getElementById('rv-city').value.trim();
  const text = document.getElementById('rv-text').value.trim();

  if (!name || !text) { showToast('Заполните имя и текст', 'error'); return; }

  if (editingReviewIdx !== null) {
    const r = content.reviews[editingReviewIdx];
    saveModalFields(r, modalLang);
    r.avatar = avatar || r.avatar;
    r.avatarClass = selectedAvatarColor;
  } else {
    const r = { avatar, avatarClass: selectedAvatarColor, name: {}, city: {}, text: {} };
    r.name[modalLang] = name;
    r.city[modalLang] = city;
    r.text[modalLang] = text;
    content.reviews.push(r);
  }

  await fetch('api/content.php', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(content) });
  closeModal();
  renderReviewsPanel(document.getElementById('mainArea'));
  showToast('Отзыв сохранён', 'success');
}

function deleteReview(idx) {
  if (!confirm('Удалить этот отзыв?')) return;
  content.reviews.splice(idx, 1);
  fetch('api/content.php', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(content) });
  renderReviewsPanel(document.getElementById('mainArea'));
  showToast('Отзыв удалён', 'success');
}

function closeModal() { document.getElementById('reviewModal').classList.remove('open'); }
function selectColor(c) {
  selectedAvatarColor = c;
  document.querySelectorAll('.color-opt').forEach(el => el.classList.toggle('selected', el.dataset.color === c));
}

// ─── Media ────────────────────────────────────────────────────────────────────
function renderMediaPanel(container) {
  const slots = MEDIA_SLOTS.map(slot => {
    const cur = content.media?.[slot.key] || slot.default;
    const isVideo = slot.type === 'video';
    const inner = isVideo
      ? `<div class="media-card-video-icon">▶</div>
         <div class="media-card-overlay">
           <button class="media-card-replace-btn" onclick="replaceMedia('${slot.key}','${slot.type}');event.stopPropagation()">Заменить</button>
         </div>`
      : `<img src="${cur}?t=${Date.now()}" alt="" onerror="this.style.opacity='0.2'">
         <div class="media-card-overlay">
           <button class="media-card-replace-btn" onclick="replaceMedia('${slot.key}','${slot.type}');event.stopPropagation()">Заменить</button>
         </div>`;
    return `<div class="media-card">
      <div class="media-card-img-wrap">${inner}</div>
      <div class="media-card-footer">
        <div class="media-card-label">${slot.label}</div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="panel active">
      <div class="panel-title">Медиафайлы</div>
      <div class="panel-desc">Наведите на фото или видео — появится кнопка «Заменить». Новый файл загрузится на сервер автоматически.</div>
      <div class="media-grid">${slots}</div>
      <div class="field-section-title">Все загруженные файлы</div>
      <div class="media-upload-area" onclick="document.getElementById('libUpload').click()">
        <div style="font-size:1.5rem;color:var(--text-dim)">+</div>
        <p>Нажмите чтобы загрузить файл в библиотеку</p>
      </div>
      <input type="file" id="libUpload" style="display:none" accept="image/*,video/*" onchange="uploadToLibrary(this)">
      <div class="media-library" id="mediaLibrary">Загрузка...</div>
    </div>`;
  loadMediaLibrary();
}

async function loadMediaLibrary() {
  const files = await fetch('api/media.php').then(r => r.json());
  const lib = document.getElementById('mediaLibrary');
  if (!lib) return;
  if (!files.length) { lib.innerHTML = '<p style="color:var(--text-dim);font-size:0.75rem">Нет файлов</p>'; return; }
  lib.innerHTML = files.map(f => {
    const isVideo = /\.(mp4|webm|mov)$/i.test(f.name);
    const thumb = isVideo
      ? `<div class="media-lib-thumb" style="background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--text-dim)">▶</div>`
      : `<img class="media-lib-thumb" src="${f.path}" alt="${f.name}" onerror="this.style.background='var(--surface2)'">`;
    return `<div class="media-lib-item" title="${f.name}" onclick="copyPath('${f.path}')">${thumb}<div class="media-lib-name">${f.name}</div></div>`;
  }).join('');
}

function replaceMedia(key, type) {
  pendingMediaSlot = key;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = type === 'video' ? 'video/*' : 'image/*';
  input.onchange = async () => {
    if (!input.files[0]) return;
    const fd = new FormData();
    fd.append('file', input.files[0]);
    showToast('Загрузка...', '');
    const r = await fetch('api/upload.php', { method: 'POST', body: fd });
    if (!r.ok) { showToast('Ошибка загрузки', 'error'); return; }
    const { path } = await r.json();
    if (!content.media) content.media = {};
    content.media[key] = path;
    await fetch('api/content.php', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(content) });
    showToast('Файл заменён', 'success');
    showPanel(currentPanel);
    if (previewOpen) setTimeout(refreshPreview, 400);
  };
  input.click();
}

async function uploadToLibrary(input) {
  if (!input.files[0]) return;
  const fd = new FormData();
  fd.append('file', input.files[0]);
  showToast('Загрузка...', '');
  const r = await fetch('api/upload.php', { method: 'POST', body: fd });
  if (r.ok) { showToast('Файл загружен — нажмите на него чтобы скопировать путь', 'success'); loadMediaLibrary(); }
  else showToast('Ошибка загрузки', 'error');
  input.value = '';
}

function copyPath(path) {
  navigator.clipboard.writeText(path).then(() => showToast(`Скопировано: ${path}`, 'success'));
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modal on overlay click
document.getElementById('reviewModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ─── Preview ──────────────────────────────────────────────────────────────────
function togglePreview() {
  previewOpen = !previewOpen;
  document.getElementById('previewPane').classList.toggle('open', previewOpen);
  document.getElementById('previewToggle').classList.toggle('active', previewOpen);
  if (previewOpen) {
    const frame = document.getElementById('previewFrame');
    if (!frame.src || frame.src === window.location.href) frame.src = 'index.html';
  }
}

function refreshPreview() {
  document.getElementById('previewFrame').src = 'index.html?t=' + Date.now();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
